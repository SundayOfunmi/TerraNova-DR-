name: CI/CD Pipeline
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Mock Data and Model
        run: |
          # Create data folders
          mkdir -p data/raw models
          
          # Create a dummy CSV so ingestion/processing logic doesn't fail
          echo "disasterNumber,state,declarationDate" > data/raw/DisasterDeclarationsSummaries.csv
          echo "1,NY,2024-01-01" >> data/raw/DisasterDeclarationsSummaries.csv
          
          # Create a tiny dummy model artifact for the API to load
          python -c "
          import joblib, pandas as pd, numpy as np
          from sklearn.ensemble import RandomForestRegressor
          from sklearn.pipeline import Pipeline
          from sklearn.compose import ColumnTransformer
          from sklearn.preprocessing import StandardScaler, OneHotEncoder

          # Match the structure expected by your API/Trainer
          num_features = ['declaration_year', 'region']
          cat_features = ['incidentType', 'state', 'season']
          
          prep = ColumnTransformer([
              ('num', StandardScaler(), num_features),
              ('cat', OneHotEncoder(handle_unknown='ignore'), cat_features)
          ])
          
          model = Pipeline([('prep', prep), ('model', RandomForestRegressor(n_estimators=1))])
          
          # Train on one row of fake data
          X = pd.DataFrame([{'declaration_year': 2024, 'region': 2, 'incidentType': 'Flood', 'state': 'NY', 'season': 'Summer'}])
          y = [15.0]
          model.fit(X, y)
          joblib.dump(model, 'models/best_model.pkl')
          "

      - name: Start API and Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Start the API in the background
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          
          # Wait for the model to load and server to start
          sleep 10
          
          # Run the integration tests
          pytest tests/
